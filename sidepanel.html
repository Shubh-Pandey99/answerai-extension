<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Meeting Assistant</title>
  <link rel="stylesheet" href="sidepanel.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="mode-ready">
  <div class="app-container">
    <!-- Header -->
    <header class="saas-header">
      <div class="status-group">
        <span class="status-dot"></span>
        <h2 id="header-title">Ready</h2>
      </div>

      <!-- Mode Toggle -->
      <div class="mode-toggle">
        <button id="toggle-transcript" class="toggle-item active" title="View Transcript">
          <i data-lucide="file-text"></i>
        </button>
        <button id="toggle-capture" class="toggle-item" title="View Capture">
          <i data-lucide="camera"></i>
        </button>
      </div>

      <div class="header-actions">
        <button class="ghost-btn" id="close-panel"><i data-lucide="chevron-left"></i></button>
      </div>
    </header>

    <main class="content-area">
      <!-- Context Section -->
      <section class="context-card">
        <div class="card-label">Context View</div>

        <!-- Mode: Ready -->
        <div id="ready-view" class="view-content">
          <div class="hero-icon">🤖</div>
          <h3>AI Assistant</h3>
          <p>Ready to capture and process your meetings in real-time.</p>
          <button id="start-recording-btn" class="primary-action-btn">Start Recording</button>
        </div>

        <!-- Mode: Recording -->
        <div id="recording-view" class="view-content hidden">
          <div id="live-transcript" class="transcript-box" contenteditable="true" placeholder="Listening to audio...">
          </div>
        </div>

        <!-- Mode: Captured -->
        <div id="captured-view" class="view-content hidden">
          <div class="image-frame">
            <img id="active-image" src="" alt="Captured">
            <div class="carousel-dots">
              <span class="dot active"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
          </div>
        </div>

        <!-- Mode: Result -->
        <div id="result-view" class="view-content hidden">
          <div class="result-header">Result Text</div>
          <div id="ai-response-text" class="ai-text"></div>
        </div>
      </section>

      <!-- Primary Actions Bar (Dynamic Pills) -->
      <section id="primary-toolbar" class="actions-section">
        <div id="recording-tools" class="pill-group hidden">
          <button id="summarize-btn" class="pill-btn">Summarize</button>
          <button id="tasks-btn" class="pill-btn">Extract Tasks</button>
          <button id="improve-btn" class="pill-btn">Improve</button>
        </div>
        <div id="captured-tools" class="pill-group hidden">
          <button id="analyze-btn" class="pill-btn dark">Analyze</button>
          <button id="ocr-btn" class="pill-btn">Extract Text</button>
          <button id="explain-btn" class="pill-btn">Explain</button>
        </div>
      </section>

      <!-- Secondary Quick Actions / Results Area -->
      <section class="footer-sections">
        <div class="accordion-item">
          <div class="accordion-header">
            <span>Quick Actions</span>
          </div>
          <div class="pill-group mini">
            <button id="capture-shortcut" class="mini-pill">Capture</button>
            <button id="ocr-shortcut" class="mini-pill">OCR</button>
            <button id="explain-shortcut" class="mini-pill">Explain</button>
          </div>
        </div>

        <div id="ai-result-accordion" class="accordion-item">
          <div class="accordion-header">
            <span>AI Result</span>
            <i data-lucide="chevron-down"></i>
          </div>
        </div>
      </section>
    </main>

    <!-- Bottom Ask Bar -->
    <footer class="saas-footer">
      <div class="ask-container">
        <input type="text" id="ask-input" placeholder="Ask AI..." autocomplete="off">
        <button id="send-btn" class="icon-send-btn"><i data-lucide="send"></i></button>
        <i data-lucide="chevron-down" class="expand-icon"></i>
      </div>

      <!-- Hidden Settings for UI Cleanliness -->
      <details class="ui-settings">
        <summary><i data-lucide="settings"></i></summary>
        <div class="settings-panel">
          <select id="model-select">
            <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
            <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
          </select>
          <input type="text" id="vercel-url-input" placeholder="API URL">
          <button id="save-settings">Save</button>
        </div>
      </details>
    </footer>
  </div>

  <script src="sidepanel.js"></script>
  <script>lucide.createIcons();</script>
</body>

</html>
