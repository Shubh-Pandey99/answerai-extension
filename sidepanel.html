<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>AI Meeting Assistant - Side Panel</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>

<body>
  <div class="container">
    <header class="header">
      <div class="brand">
        <img src="icon.png" class="logo" alt="logo" />
        <h1>AI Assistant</h1>
      </div>
      <div class="header-actions">
        <!-- Icons removed as per user request -->
      </div>
    </header>

    <div class="content-area">
      <!-- Recording Status -->
      <section class="card status-card">
        <div class="status-info">
          <div id="recording-btn-container">
            <button id="main-record-toggle" class="record-btn">
              <span class="icon">🔴</span> Start Recording
            </button>
          </div>
          <div class="status-badges">
            <span id="status-text">Inactive</span>
            <span id="live-dot" class="dot hidden"></span>
          </div>
        </div>

        <div class="visualizer-container">
          <div class="waveform" id="waveform">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>
        </div>

        <div id="live-transcript" class="transcript-monitor">
          <div class="empty-state">No transcript yet. Start recording to see live captions.</div>
        </div>

        <div class="audio-source-settings hidden">
          <label class="switch-label">
            <input id="listen-mode" type="checkbox" checked />
            <span class="label-text">Capture Tab Audio</span>
          </label>
        </div>
      </section>

      <!-- Action Grid -->
      <div class="action-grid">
        <button id="capture-screen" class="action-card">
          <span class="action-icon">📸</span>
          <span class="action-label">Capture Screen</span>
        </button>
        <button id="summarize" class="action-card">
          <span class="action-icon">📝</span>
          <span class="action-label">Summarize</span>
        </button>
      </div>

      <!-- Preview Area -->
      <section id="capture-preview-area" class="card hidden">
        <div class="preview-header">
          <h3>Screen Preview</h3>
          <button id="summarize-image" class="primary sm">AI Analyze</button>
        </div>
        <div id="screenshot-container">
          <img id="screenshot-preview" class="preview" />
          <canvas id="annotation-canvas" class="preview hidden"></canvas>
        </div>
        <div class="preview-actions">
          <button id="annotate-image" class="ghost sm">Annotate</button>
          <button id="save-annotation" class="ghost sm hidden">Confirm Edits</button>
        </div>
      </section>

      <!-- AI Chat -->
      <section class="card chat-card">
        <h3>AI Assistant Q&A</h3>
        <div id="qqa-response" class="response hidden"></div>
        <div class="input-group">
          <input id="ask-input" placeholder="Ask a question about the meeting..." />
          <button id="send-ask" class="icon-btn">🚀</button>
        </div>
      </section>

      <!-- Modern Collapsible Settings -->
      <details class="settings-details">
        <summary>Advanced Settings</summary>
        <div class="card settings-card">
          <div class="field">
            <label>Provider</label>
            <select id="provider-select">
              <option value="google">Google Gemini</option>
              <option value="openai">OpenAI</option>
            </select>
          </div>
          <div class="field">
            <label>Model</label>
            <select id="model-select">
              <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
              <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
              <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
              <option value="gpt-4o">GPT-4o</option>
              <option value="gpt-4o-mini">GPT-4o Mini</option>
            </select>
          </div>
          <div class="field">
            <label>API Endpoint</label>
            <input id="vercel-url-input" placeholder="https://..." />
          </div>
          <button id="save-settings" class="primary block">Save Configuration</button>
        </div>
      </details>
    </div>

    <footer class="footer-nav">
      <div id="dashboard-link">View Meeting History ↗</div>
    </footer>
  </div>

  <script src="sidepanel.js"></script>
</body>

</html>
