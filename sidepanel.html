<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Meeting Assistant</title>
  <link rel="stylesheet" href="sidepanel.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="app-container">
    <!-- 1. HEADER -->
    <header class="main-header">
      <div class="header-left">
        <button id="main-record-toggle" class="record-btn">
          <span class="record-icon"></span>
          <span id="record-text">Start Recording</span>
        </button>
      </div>
      <div class="header-right">
        <div id="live-indicator" class="status-indicator hidden">
          <span class="dot"></span>
          <span class="status-label">LIVE</span>
        </div>
      </div>
    </header>

    <main class="scrollable-content">
      <!-- 2. TRANSCRIPT PANEL -->
      <section class="panel-section transcript-section">
        <div class="section-header">
          <h2>Transcript</h2>
          <div class="section-actions">
            <button id="copy-transcript" class="icon-btn" title="Copy Transcript"><i data-lucide="copy"></i></button>
            <button id="clear-transcript" class="icon-btn" title="Clear All"><i data-lucide="trash-2"></i></button>
          </div>
        </div>
        <div class="card transcript-card">
          <div id="live-transcript" class="transcript-box" contenteditable="true"
            placeholder="No transcript yet. Play audio to see live captions..."></div>
          <div class="transcript-hover-controls">
            <button id="regenerate-summary" class="mini-btn" title="Summarize this section"><i
                data-lucide="refresh-cw"></i> Summarize</button>
          </div>
        </div>
      </section>

      <!-- 3. TOOLS BAR -->
      <section class="tools-bar">
        <button id="capture-screen" class="tool-btn primary">
          <i data-lucide="camera"></i>
          <span>Capture</span>
        </button>
        <button id="summarize-transcript" class="tool-btn">
          <i data-lucide="file-text"></i>
          <span>Summarize</span>
        </button>
        <button id="analyze-vision" class="tool-btn hidden" id="vision-btn">
          <i data-lucide="eye"></i>
          <span>Analyze</span>
        </button>
      </section>

      <!-- 4. CAPTURE PREVIEW PANEL -->
      <section id="capture-panel" class="panel-section capture-section hidden">
        <div class="section-header">
          <h2>Captures</h2>
          <span id="capture-count" class="badge">0</span>
        </div>
        <div id="capture-grid" class="capture-grid">
          <!-- Thumbnails will be injected here -->
        </div>
      </section>

      <!-- 5. AI PANEL -->
      <section id="ai-response-section" class="panel-section ai-section hidden">
        <div class="section-header">
          <h2>AI Assistant</h2>
          <button id="clear-ai-chat" class="icon-btn sm"><i data-lucide="x-circle"></i></button>
        </div>
        <div class="card ai-card">
          <div id="qqa-response" class="ai-output"></div>
        </div>
      </section>

      <!-- Placeholder for spacing -->
      <div class="bottom-spacer"></div>
    </main>

    <!-- 6. BOTTOM INPUT -->
    <footer class="main-footer">
      <div class="input-container">
        <input type="text" id="ask-input" placeholder="Ask AI about transcript or screen..." autocomplete="off">
        <button id="send-ask" class="send-btn">
          <i data-lucide="send"></i>
        </button>
      </div>

      <!-- Collapsible Settings Link -->
      <div class="footer-meta">
        <details class="settings-drawer">
          <summary>Settings</summary>
          <div class="settings-content">
            <div class="field">
              <label>Model</label>
              <select id="model-select">
                <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                <option value="gpt-4o">GPT-4o</option>
              </select>
            </div>
            <div class="field">
              <label>API Endpoint</label>
              <input type="text" id="vercel-url-input" placeholder="Vercel URL">
            </div>
            <button id="save-settings" class="mini-btn block">Save</button>
            <div id="dashboard-link" class="dashboard-link">Open Dashboard ↗</div>
          </div>
        </details>
      </div>
    </footer>
  </div>

  <!-- Templates -->
  <template id="capture-item-template">
    <div class="capture-item">
      <img class="capture-img" src="" alt="Captured screen">
      <div class="capture-overlay">
        <button class="expand-capture" title="Expand"><i data-lucide="maximize-2"></i></button>
        <button class="delete-capture" title="Delete"><i data-lucide="trash-2"></i></button>
      </div>
    </div>
  </template>

  <script src="sidepanel.js"></script>
  <script>
    // Initialize Lucide icons
    lucide.createIcons();
  </script>
</body>

</html>
