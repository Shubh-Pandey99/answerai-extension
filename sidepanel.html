<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synapse AI</title>
  <link rel="stylesheet" href="sidepanel.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="lucide.min.js"></script>
</head>

<body class="mode-ready">
  <div class="app-container" id="app">
    <!-- Header -->
    <header class="saas-header">
      <div class="header-left">
        <h2 id="header-title">Synapse AI</h2>
      </div>

      <!-- Mode Toggle -->
      <div class="mode-toggle">
        <button id="toggle-transcript" class="toggle-item active" title="View Transcript">
          <i data-lucide="file-text"></i>
        </button>
        <button id="toggle-capture" class="toggle-item" title="View Image Capture">
          <i data-lucide="camera"></i>
        </button>
      </div>

      <div class="header-actions">
        <button class="ghost-btn" id="dashboard-btn" title="Meeting History"><i data-lucide="history"></i></button>
      </div>
    </header>

    <div id="error-display" class="error-banner hidden"></div>

    <main class="content-area">
      <!-- Unified Context Card -->
      <article class="context-card">

        <div class="workspace-scroller">

          <!-- Transcript Section -->
          <section id="recording-view" class="view-content">
            <div class="view-header">
              <div class="header-status">
                <div class="card-meta">Live Transcription</div>
                <!-- Audio Monitor -->
                <div id="audio-monitor" class="audio-meter">
                  <div id="meter-fill" class="meter-bar"></div>
                </div>
              </div>
              <button id="main-record-btn" class="record-action-btn">
                <div class="pulse-dot"></div>
                <span id="record-btn-text">Start Recording</span>
              </button>
            </div>

            <div id="live-transcript" class="transcript-box" contenteditable="true"
              placeholder="Audio text will appear here once you start recording..."></div>

            <div id="status-log" class="status-feed">
              <div class="status-item">● Initializing Workspace...</div>
            </div>
          </section>

          <!-- Image Section -->
          <section id="captured-view" class="view-content hidden">
            <div class="card-meta">Screen Snapshot</div>
            <div class="image-frame">
              <img id="active-image" src="" alt="Captured Context">
            </div>
          </section>

          <!-- AI INSIGHTS AREA -->
          <section id="result-view" class="view-content hidden">
            <div class="card-meta" id="result-meta">AI Insights</div>
            <div id="ai-response-text" class="ai-text" contenteditable="true"></div>
            <button class="action-link" id="back-to-transcript-btn">← Back to Transcript</button>
          </section>

        </div>

        <!-- Dynamic Primary Action Button -->
        <footer class="card-footer" id="card-action-bar">
          <button id="process-content-btn" class="process-btn">
            <i data-lucide="sparkles"></i> <span>Summarize Transcription</span>
          </button>
        </footer>
      </article>
    </main>

    <!-- Bottom Command Bar -->
    <footer class="saas-footer">
      <div class="ask-container">
        <input type="text" id="ask-input" placeholder="Ask anything about this meeting..." autocomplete="off">
        <button id="send-btn" class="icon-send-btn"><i data-lucide="arrow-up"></i></button>
      </div>

      <div class="footer-meta">
        <details class="ui-settings">
          <summary>Settings <i data-lucide="chevron-up"></i></summary>
          <div class="settings-panel">
            <div class="field">
              <label>Model</label>
              <select id="model-select">
                <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
              </select>
            </div>
            <div class="field">
              <label>API URL</label>
              <input type="text" id="vercel-url-input" placeholder="https://...">
            </div>
            <button id="save-settings" class="save-btn">Save Changes</button>
          </div>
        </details>
      </div>
    </footer>
  </div>

  <script src="sidepanel.js"></script>
</body>

</html>
