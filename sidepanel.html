<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Meeting Assistant</title>
  <link rel="stylesheet" href="sidepanel.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="mode-empty">
  <div class="app-container">
    <!-- 1. HEADER (48px) -->
    <header class="main-header">
      <div class="header-left">
        <button id="main-record-toggle" class="record-btn-minimal">
          <span class="record-dot"></span>
          <span id="record-text">Record</span>
        </button>
      </div>
      <div class="header-center">
        <h1 class="app-title">AI Assistant</h1>
      </div>
      <div class="header-right">
        <button id="capture-screen" class="icon-tool-btn" title="Capture Screen">
          <i data-lucide="camera"></i>
          <span class="fallback-icon">📸</span>
        </button>
      </div>
    </header>

    <!-- 2. PRIMARY WORK AREA (Dynamic) -->
    <main class="work-area">
      <!-- Empty State -->
      <div id="empty-state" class="empty-view">
        <div class="hero-icon">🤖</div>
        <h2>Ready to assist</h2>
        <p>Start recording audio or capture a screen to begin.</p>
        <button id="empty-capture-btn" class="action-pill primary" style="margin-top: 20px;">
          <i data-lucide="camera"></i> <span>Capture Screen</span>
        </button>
      </div>

      <!-- Transcript View (Mode: Recording) -->
      <div id="transcript-view" class="context-view hidden">
        <div class="view-header">
          <h3>Live Transcript</h3>
          <div class="header-actions">
            <button id="copy-transcript" class="ghost-icon-btn"><i data-lucide="copy"></i></button>
            <button id="clear-transcript" class="ghost-icon-btn"><i data-lucide="trash-2"></i></button>
          </div>
        </div>
        <div id="live-transcript" class="transcript-content" contenteditable="true" placeholder="Waiting for audio...">
        </div>
      </div>

      <!-- Capture View (Mode: Captured) -->
      <div id="capture-view" class="context-view hidden">
        <div class="view-header">
          <h3>Captured Screen</h3>
          <button id="delete-capture" class="ghost-icon-btn"><i data-lucide="x"></i></button>
        </div>
        <div class="image-container">
          <img id="active-capture-img" class="large-preview" alt="Captured screen">
        </div>
      </div>
    </main>

    <!-- 3. CONTEXTUAL TOOLBAR -->
    <div id="contextual-toolbar" class="toolbar hidden">
      <!-- Transcript Actions -->
      <div id="transcript-tools" class="tool-group hidden">
        <button id="summarize-transcript" class="action-pill"><i data-lucide="file-text"></i> Summarize</button>
        <button id="extract-tasks" class="action-pill"><i data-lucide="list-checks"></i> Tasks</button>
      </div>
      <!-- Image Actions -->
      <div id="image-tools" class="tool-group hidden">
        <button id="analyze-image" class="action-pill primary"><i data-lucide="sparkles"></i> Analyze</button>
        <button id="ocr-image" class="action-pill"><i data-lucide="type"></i> Extract Text</button>
      </div>
    </div>

    <!-- 4. AI OUTPUT (Collapsible Drawer) -->
    <div id="ai-drawer" class="ai-drawer collapsed">
      <div id="ai-drawer-handle" class="drawer-header">
        <span>AI Insights</span>
        <i data-lucide="chevron-up" class="drawer-icon"></i>
      </div>
      <div class="drawer-content">
        <div id="qqa-response" class="ai-text-output"></div>
      </div>
    </div>

    <!-- 5. BOTTOM INPUT -->
    <footer class="input-footer">
      <div class="input-wrapper">
        <input type="text" id="ask-input" placeholder="Ask anything..." autocomplete="off">
        <button id="send-ask" class="send-button">
          <i data-lucide="arrow-up"></i>
        </button>
      </div>

      <!-- Settings Details -->
      <details class="minimal-settings">
        <summary><i data-lucide="settings"></i></summary>
        <div class="settings-popover">
          <div class="setting-row">
            <label>Model</label>
            <select id="model-select">
              <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
              <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
              <option value="gpt-4o">GPT-4o</option>
            </select>
          </div>
          <div class="setting-row">
            <label>API</label>
            <input type="text" id="vercel-url-input" placeholder="Vercel URL">
          </div>
          <button id="save-settings" class="mini-save">Save</button>
          <div id="dashboard-link" class="dash-btn">History ↗</div>
        </div>
      </details>
    </footer>
  </div>

  <script src="sidepanel.js"></script>
  <script>lucide.createIcons();</script>
</body>

</html>
